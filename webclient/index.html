<!DOCTYPE html>
<html data-theme="cerberus" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renardo WebClient</title>
    <script>
      // Polyfill for hydra-synth
      window.global = window;
      // Apply color scheme mode before render to avoid flash (Skeleton v4 data-mode strategy)
      (function () {
        var mode = localStorage.getItem('color-scheme-mode') || 'dark';
        if (mode === 'auto') {
          mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-mode', mode);
      })();
    </script>
  </head>
  <body>
    <div id="background-canvas-container"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
