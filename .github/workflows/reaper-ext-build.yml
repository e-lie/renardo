name: Build REAPER Fresh Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: reaper_renardo_fresh_linux_x86_64.so
            lib_name: librenardo_reaper_fresh_ext.so

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: reaper_renardo_fresh_linux_aarch64.so
            lib_name: librenardo_reaper_fresh_ext.so

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: reaper_renardo_fresh_windows_x86_64.dll
            lib_name: renardo_reaper_fresh_ext.dll

          - os: macos-12
            target: x86_64-apple-darwin
            artifact_name: reaper_renardo_fresh_macos_x86_64.dylib
            lib_name: librenardo_reaper_fresh_ext.dylib

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: reaper_renardo_fresh_macos_arm64.dylib
            lib_name: librenardo_reaper_fresh_ext.dylib

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/renardo/reaper_backend_fresh/rust_extension/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src/renardo/reaper_backend_fresh/rust_extension/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        working-directory: src/renardo/reaper_backend_fresh/rust_extension
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cp src/renardo/reaper_backend_fresh/rust_extension/target/${{ matrix.target }}/release/${{ matrix.lib_name }} ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
