name: Build Electron (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webclient/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download standalone Python
        run: python install_standalone_python.py --yes

      - name: Install dependencies
        working-directory: webclient
        run: npm ci

      - name: Build Electron app
        working-directory: webclient
        run: npm run dist -- --linux deb AppImage

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: renardo-linux-deb
          path: webclient/dist-electron/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: renardo-linux-appimage
          path: webclient/dist-electron/*.AppImage
