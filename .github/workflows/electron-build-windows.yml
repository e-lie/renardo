name: Build Electron (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webclient_fresh/package-lock.json

      - name: Install dependencies
        working-directory: webclient_fresh
        run: npm ci

      - name: Build Electron app
        working-directory: webclient_fresh
        run: npm run dist -- --win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: renardo-windows
          path: webclient_fresh/dist-electron/*.exe
